
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  #oj-entry {
    background: #000;
    color: #fff;
    font-family: 'Space Mono', monospace;
    width: 100%;
    min-height: 600px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .grain {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 1;
  }

  .scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 5;
    padding: 40px;
    text-align: center;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  .logo-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 140px);
    letter-spacing: 0.08em;
    color: #fff;
    line-height: 1;
  }
  .logo-mark.flicker { animation: flicker 0.06s steps(1) infinite; }
  @keyframes flicker {
    0%   { opacity: 1; }
    25%  { opacity: 0.85; }
    50%  { opacity: 1; }
    75%  { opacity: 0.9; }
    100% { opacity: 1; }
  }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: #555;
    margin-top: 12px;
    text-transform: uppercase;
  }

  .drop-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 3vw, 18px);
    letter-spacing: 0.5em;
    color: #555;
    margin-bottom: 16px;
  }
  .drop-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 14vw, 110px);
    letter-spacing: 0.02em;
    color: #fff;
    line-height: 1;
  }
  .drop-name {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #C9A96E;
    margin-top: 20px;
    text-transform: uppercase;
  }
  .drop-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, #333, transparent);
    margin: 32px auto 0;
  }

  .fragments {
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
    max-width: 340px;
  }
  .frag {
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transform: translateX(-12px);
    transition: all 0.6s ease;
  }
  .frag.shown { opacity: 1; transform: translateX(0); }
  .frag-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    color: #333;
    letter-spacing: 0.2em;
    min-width: 32px;
  }
  .frag-bar { width: 32px; height: 1px; background: #C9A96E; flex-shrink: 0; }
  .frag-name { font-size: 13px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; }
  .frag-reveal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    color: #fff;
    letter-spacing: 0.05em;
  }

  .enter-label {
    font-size: 10px;
    letter-spacing: 0.5em;
    color: #444;
    margin-bottom: 48px;
    text-transform: uppercase;
  }
  .enter-btn {
    background: transparent;
    border: 1px solid #C9A96E;
    color: #C9A96E;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 16px 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: block;
  }
  .enter-btn:hover { background: #C9A96E; color: #000; }
  .enter-msg {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #333;
    margin-top: 24px;
    text-transform: uppercase;
    line-height: 1.8;
  }

  .dots {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: #333; transition: background 0.4s; }
  .dot.active { background: #C9A96E; }

  @keyframes glitch {
    0%   { clip-path: inset(0 0 95% 0); transform: translateX(-4px); }
    10%  { clip-path: inset(40% 0 50% 0); transform: translateX(4px); }
    20%  { clip-path: inset(80% 0 10% 0); transform: translateX(-2px); }
    30%  { clip-path: inset(20% 0 70% 0); transform: translateX(2px); }
    40%  { clip-path: inset(60% 0 30% 0); transform: translateX(-4px); }
    50%  { clip-path: inset(10% 0 85% 0); transform: translateX(0); }
    100% { clip-path: inset(0 0 100% 0); transform: translateX(0); }
  }
  .glitch-layer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 140px);
    letter-spacing: 0.08em;
    color: #C9A96E;
    opacity: 0;
    pointer-events: none;
    z-index: 6;
  }
  .glitch-layer.fire { animation: glitch 0.15s steps(1) 3; opacity: 0.6; }
</style>

<div id="oj-entry" aria-label="OJOSS DROP 01 — Secuencia de entrada">
  <div class="grain"></div>
  <div class="scanline"></div>
  <div class="glitch-layer" id="glitch">OJ0$$</div>

  <div class="screen active" id="s1">
    <div class="logo-mark" id="logo">OJ0$$</div>
    <div class="logo-sub">Publicity</div>
  </div>

  <div class="screen" id="s2">
    <div class="drop-label">— Drop —</div>
    <div class="drop-number">01</div>
    <div class="drop-name">Submerged</div>
    <div class="drop-line"></div>
  </div>

  <div class="screen" id="s3">
    <div class="fragments" id="frags">
      <div class="frag" data-delay="0">
        <span class="frag-num">001</span>
        <span class="frag-bar"></span>
        <div>
          <div class="frag-name">Variante</div>
          <div class="frag-reveal">VOID</div>
        </div>
      </div>
      <div class="frag" data-delay="300">
        <span class="frag-num">002</span>
        <span class="frag-bar"></span>
        <div>
          <div class="frag-name">Variante</div>
          <div class="frag-reveal">STATIC</div>
        </div>
      </div>
      <div class="frag" data-delay="600">
        <span class="frag-num">003</span>
        <span class="frag-bar"></span>
        <div>
          <div class="frag-name">Variante</div>
          <div class="frag-reveal">INVERTED</div>
        </div>
      </div>
    </div>
  </div>

  <div class="screen" id="s4">
    <div class="enter-label">No todos entran</div>
    <button class="enter-btn" onclick="sendPrompt('Quiero ver la entrada completa del DROP 01 de OJOSS')">Entrar al Drop</button>
    <div class="enter-msg">Unidades limitadas · Se va en 7 días</div>
  </div>

  <div class="dots">
    <div class="dot active" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
</div>

<script>
  var screens = ['s1','s2','s3','s4'];
  var current = 0;
  var timer;

  function showScreen(idx) {
    screens.forEach(function(id, i) {
      document.getElementById(id).classList.toggle('active', i === idx);
      document.getElementById('d'+i).classList.toggle('active', i === idx);
    });
    current = idx;
    if (idx === 0) {
      var logo = document.getElementById('logo');
      setTimeout(function() { logo.classList.add('flicker'); }, 800);
      setTimeout(function() { logo.classList.remove('flicker'); }, 1200);
    }
    if (idx === 2) {
      document.querySelectorAll('.frag').forEach(function(f) {
        f.classList.remove('shown');
        var delay = parseInt(f.dataset.delay) || 0;
        setTimeout(function() { f.classList.add('shown'); }, delay + 200);
      });
    }
  }

  function glitch() {
    var g = document.getElementById('glitch');
    g.classList.add('fire');
    setTimeout(function() { g.classList.remove('fire'); }, 500);
  }

  function next() {
    if (current < screens.length - 1) {
      glitch();
      setTimeout(function() { showScreen(current + 1); }, 120);
      clearTimeout(timer);
      autoAdvance();
    }
  }

  function autoAdvance() {
    var delays = [2800, 2500, 3200, null];
    var d = delays[current];
    if (d !== null) timer = setTimeout(next, d);
  }

  document.getElementById('oj-entry').addEventListener('click', function(e) {
    if (!e.target.classList.contains('enter-btn')) next();
  });

  autoAdvance();
</script>
